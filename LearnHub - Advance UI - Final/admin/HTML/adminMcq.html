<body data-page="mcq">

<header class="admin-header">
    <div class="admin-header-content">
        <div>
            <h1>MCQs</h1>

        <div class="section-header">
            <h2>Manage MCQs</h2>
            <p>Attach questions to lessons and update when needed.</p>
        </div>
        <div class="form-grid">
            <select id="mcqContentSelect">
                <option value="">Select Chapter</option>
            </select>
        </div>
        <div id="mcqContainer" class="mcq-editor"></div>
        <div class="button-row">
            <button id="mcqEditBtn" class="btn ghost" type="button">Edit MCQs</button>
            <button onclick="saveMCQs()" class="btn primary">Save MCQs</button>
            <button onclick="updateMCQs()" class="btn success">Update MCQs</button>
